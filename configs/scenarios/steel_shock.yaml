scenario_id: steel_shock
description: Baseline steel-market shock scenario with public market information and private supplier impact.
max_tick: 40
default_message_delay_ticks: 1
scheduled_events:
  - event_type: public_ledger_entry
    public_ledger_entry:
      tick: 8
      entry_id: public_steel_market_tick_8
      source: system
      entry_type: market_update
      linked_object_id: steel_market
      data:
        steel_price_index_change_percent: 18
        market_lead_time_change_ticks: 2
  - event_type: private_state_update
    private_state_update:
      tick: 9
      event_id: supplier_impact_tick_9
      recipient: steel_supplier
      event_type: supplier_impact_assessment
      linked_object_id: steel_contract
      summary: The supplier received its private cost, cash, and delivery impact assessment.
      data:
        current_expected_input_cost: 12012000
        current_input_cost: 12012000
        current_delivery_forecast: 18
        standard_delivery_tick: 18
        expedited_delivery_tick: 14
        expedite_cost: 700000
        cash_available: 800000
        contract_delivery_tick: 14
        liquidated_damages_start_tick: 16
        liquidated_damages_per_tick: 50000
task_deadlines:
  - object_id: steel_delivery
    due_tick: 14
    description: Contracted steel delivery milestone.
  - object_id: handover
    due_tick: 40
    description: Target project handover.
payment_deadlines: []
contract_consequence_deadlines:
  - object_id: steel_contract
    due_tick: 16
    description: Steel liquidated damages begin if delivery is late.
