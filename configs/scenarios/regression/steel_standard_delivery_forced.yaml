scenario_id: feedback_cascade_steel_standard_delivery
description: Current feedback-cascade suite scenario where the supplier preserves liquidity and submits standard steel delivery after a public steel price shock.
max_tick: 40
default_message_delay_ticks: 1
scheduled_events:
  - event_type: public_ledger_entry
    public_ledger_entry:
      tick: 8
      entry_id: public_steel_market_tick_8
      source: system
      entry_type: market_update
      linked_object_id: steel_market
      data:
        steel_price_index_change_percent: 18
        market_lead_time_change_ticks: 2
  - event_type: private_state_update
    private_state_update:
      tick: 9
      event_id: supplier_impact_tick_9
      recipient: steel_supplier
      event_type: supplier_impact_assessment
      linked_object_id: steel_contract
      summary: The supplier received its private cost, cash, and delivery impact assessment.
      data:
        current_expected_input_cost: 12012000
        current_input_cost: 12012000
        current_delivery_forecast: 18
        standard_delivery_tick: 18
        expedited_delivery_tick: 14
        expedite_cost: 700000
        cash_available: 800000
        contract_delivery_tick: 14
        liquidated_damages_start_tick: 16
        liquidated_damages_per_tick: 50000
task_deadlines:
  - object_id: steel_delivery
    due_tick: 14
    description: Contracted steel delivery milestone.
  - object_id: handover
    due_tick: 40
    description: Target project handover.
payment_deadlines: []
contract_consequence_deadlines:
  - object_id: steel_contract
    due_tick: 16
    description: Steel liquidated damages begin if delivery is late.
decision_menu_options:
  - option_id: steel_standard_delivery_no_expedite
    actor: steel_supplier
    decision_type: submit_forecast
    object_type: steel_delivery
    object_id: steel_delivery
    label: Submit standard delivery forecast
    summary: Supplier preserves liquidity and reports the standard delivery path.
    prerequisites:
      - tick_at_least: 9
    deterministic_effects:
      - set_task_forecast:
          task_id: steel_delivery
          forecast_end_tick: 18
          forecast_cost: 12012000
    objective_public_evidence:
      - evidence_id: steel_standard_delivery_public_symptom
        visibility: public
        source: steel_supplier
        linked_object_id: steel_delivery
        entry_type: project_forecast
        summary: Supplier formally submitted steel delivery forecast at tick 18.
    private_facts_generated:
      - evidence_id: supplier_low_inventory_private_fact
        visibility: private_state
        source: system
        recipients:
          - steel_supplier
        linked_object_id: steel_contract
        summary: Supplier has no low-cost inventory buffer after the steel price spike.
      - evidence_id: supplier_low_inventory_analysis_cause
        visibility: analysis_only
        source: system
        linked_object_id: steel_contract
        summary: Low inventory forced the supplier to use market-priced steel.
    trust_risk_tags:
      - delivery_reliability_pressure
      - formal_forecast_submitted
